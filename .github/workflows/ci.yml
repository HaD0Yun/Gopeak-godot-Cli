name: CI

on:
  push:
    branches:
      - main
      - master
      - dev
      - 'feat/cli-auto-detect-update-hooks'
  pull_request:

jobs:
  build-and-typecheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Typecheck
        run: npm run typecheck

      - name: Verify README claims
        run: npm run build && npm run verify:claims
